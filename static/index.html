      continue;
    }
    // 确保有 active chat（PDF 上传需要 session_id；服务端会创建占位文件夹）
    let c = getActive();
    if (!c) c = createChat();
    const item = {
      kind: 'pdf',
      name: f.name, size: f.size,
      fileId: '', progress: 0,
      status: 'busy', xhr: null,
      sid: c.id,
    };
    pending.push(item);
    renderThumbs();
    uploadPdf(f, item).catch(err => {
      console.error(err);
      pending = pending.filter(x => x !== item);
      renderThumbs();
      alert('PDF 上传失败：' + err.message);
    });
  }
});

function uploadPdf(file, item) {
  return new Promise((resolve, reject) => {
    const fd = new FormData();
    fd.append('session_id', item.sid);
    fd.append('file', file);
    const xhr = new XMLHttpRequest();
    item.xhr = xhr;
    xhr.open('POST', '/api/upload');
    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) {
        item.progress = Math.round((e.loaded / e.total) * 100);
        renderThumbs();
      }
    };
    xhr.onload = () => {
      if (xhr.status === 401) {
        loginEl.classList.remove('hidden');
        reject(new Error('未登录'));
        return;
      }
      if (xhr.status >= 200 && xhr.status < 300) {
        try {
          const j = JSON.parse(xhr.responseText);
          item.fileId = j.file_id;
          item.status = 'ready';
          item.progress = 100;
          // 服务端创建了占位 chat，把本地 chat 标记成"已落盘"
          const c = chats.find(x => x.id === item.sid);
          if (c) c.isLocal = false;
          renderThumbs();
          resolve();
        } catch (e) { reject(e); }
      } else {
        let msg = `HTTP ${xhr.status}`;
        try { msg = JSON.parse(xhr.responseText).detail || msg; } catch {}
        reject(new Error(msg));
      }
    };
    xhr.onerror = () => reject(new Error('网络错误'));
    xhr.onabort = () => reject(new Error('已取消'));
    xhr.send(fd);
  });
}

function processImage(file, item) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      try {
        // 1) 给 API 用的版本（较大）
        const api = drawResized(img, API_MAX_EDGE, API_QUALITY);
        item.apiData = api.base64;
        item.mediaType = 'image/jpeg';
        item.width = api.width;
        item.height = api.height;
        // 2) 给输入区和历史里用的小缩略图
        const thumb = drawResized(img, THUMB_MAX_EDGE, THUMB_QUALITY);
        item.thumbDataUrl = thumb.dataUrl;
        URL.revokeObjectURL(url);
        resolve();
      } catch (err) {
        URL.revokeObjectURL(url);
        reject(err);
      }
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error('无法解码图片'));
    };
    img.src = url;
  });
}

function drawResized(img, maxEdge, quality) {
  let w = img.naturalWidth, h = img.naturalHeight;
  const m = Math.max(w, h);
  if (m > maxEdge) {
    const r = maxEdge / m;
    w = Math.round(w * r);
    h = Math.round(h * r);
  }
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, w, h);
  const dataUrl = canvas.toDataURL('image/jpeg', quality);
  const base64 = dataUrl.slice(dataUrl.indexOf(',') + 1);
  return { dataUrl, base64, width: w, height: h };
}

function renderThumbs() {
  if (pending.length === 0) {
    thumbsRowEl.classList.remove('has');
    thumbsRowEl.innerHTML = '';
    return;
  }
  thumbsRowEl.classList.add('has');
  thumbsRowEl.innerHTML = '';
  pending.forEach((p, idx) => {
    const wrap = document.createElement('div');
    if (p.kind === 'image') {
      wrap.className = 'thumb' + (p.status === 'busy' ? ' uploading' : '');
      if (p.thumbDataUrl) {
        const im = document.createElement('img');
        im.src = p.thumbDataUrl;
        wrap.appendChild(im);
      }
    } else if (p.kind === 'pdf') {
      wrap.className = 'thumb pdf' + (p.status === 'busy' ? ' uploading' : '');
      wrap.innerHTML = PDF_SVG + `<div class="pdf-info"><div class="pdf-name"></div><div class="pdf-size"></div></div>`;
      wrap.querySelector('.pdf-name').textContent = p.name;
      wrap.querySelector('.pdf-size').textContent = (p.status === 'busy')
        ? `上传中 ${p.progress || 0}%`
        : fmtSize(p.size);
      if (p.status === 'busy') {
        const bar = document.createElement('div');
        bar.className = 'progress';
        bar.style.width = (p.progress || 0) + '%';
        wrap.appendChild(bar);
      }
    }
    const x = document.createElement('button');
    x.type = 'button'; x.className = 'x'; x.textContent = '×';
    x.addEventListener('click', () => {
      if (sending) return;
      // 上传中的 PDF 取消请求
      if (p.kind === 'pdf' && p.status === 'busy' && p.xhr) {
        try { p.xhr.abort(); } catch {}
      }
      pending.splice(idx, 1);
      renderThumbs();
    });
    wrap.appendChild(x);
    thumbsRowEl.appendChild(wrap);
  });
}

// ============== Copy ==============
// 在 HTTPS / localhost 用 Clipboard API；局域网 http 下降级到 execCommand
async function copyText(text, btn) {
  text = text || '';
  let ok = false;
  if (navigator.clipboard && window.isSecureContext) {
    try { await navigator.clipboard.writeText(text); ok = true; } catch {}
  }
  if (!ok) {
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.contentEditable = 'true';
      ta.readOnly = false;
      ta.style.position = 'fixed';
      ta.style.top = '0';
      ta.style.left = '0';
      ta.style.width = '1px';
      ta.style.height = '1px';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      const range = document.createRange();
      range.selectNodeContents(ta);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      ta.setSelectionRange(0, text.length);
      ok = document.execCommand('copy');
      sel.removeAllRanges();
      ta.remove();
    } catch { ok = false; }
  }
  if (btn) {
    const lab = btn.querySelector('.cp-label');
    if (lab) {
      lab.textContent = ok ? '已复制' : '复制失败';
      btn.classList.toggle('copied', ok);
      clearTimeout(btn._cpTimer);
      btn._cpTimer = setTimeout(() => {
        lab.textContent = '复制';
        btn.classList.remove('copied');
      }, 1500);
    }
  }
}

// ============== Send ==============
// 停止按钮：流式中点 sendBtn 时同时 abort fetch + cancel reader
// 之所以两个都调，是因为某些浏览器下 ctrl.abort() 不会让 reader.read() 立刻返回，
// 必须再调一次 reader.cancel() 才能真正结束流。
sendBtn.addEventListener('click', () => {
  if (!sending) return;
  stoppedByUser = true;
  if (currentAbortCtrl) { try { currentAbortCtrl.abort(); } catch {} }
  if (currentReader)    { try { currentReader.cancel(); } catch {} }
});

chatForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = inputEl.value.trim();
  const imgs = pending.filter(p => p.kind === 'image' && p.status === 'ready' && p.apiData);
  const pdfs = pending.filter(p => p.kind === 'pdf');
  if (sending) return;
  if (!text && imgs.length === 0 && pdfs.length === 0) return;
  // 还有附件在处理中？等一下
  if (pending.some(p => p.status === 'busy')) {
    alert('附件还在处理中，稍等一下');
    return;
  }
  if (pending.some(p => p.status === 'error')) {
    alert('附件上传失败，请移除后重发');
    return;
  }
  // PDF 必须在 GPT-5.5 路径
  if (pdfs.length && !NON_CLAUDE_MODELS.has(curModel)) {
    alert('PDF 只能用 GPT-5.5 发送，请切换模型');
    return;
  }

  // 确保有 active chat
  let c = getActive();
  if (!c) c = createChat();

  // 构造提交给 API 的图片（含 thumb_data + 尺寸）
  const imagesForApi = imgs.map(p => ({
    data: p.apiData,
    media_type: p.mediaType,
    thumb_data: p.thumbDataUrl,
    width: p.width,
    height: p.height,
  }));
  const documentIds = pdfs.map(p => p.fileId);

  // 立即追加到本地 messages 用于显示（服务端也会落盘）
  // 用 ObjectURL 临时显示用户上传的图片缩略图（页面刷新后转为 /api/files/.../thumb）
  const localAttachments = [
    ...imgs.map(p => ({ type: 'image', _localThumb: p.thumbDataUrl, width: p.width, height: p.height })),
    ...pdfs.map(p => ({ type: 'pdf', file_id: p.fileId, name: p.name, size: p.size })),
  ];
  const userMsg = { role: 'user', content: text };
  if (localAttachments.length) userMsg.attachments = localAttachments;
  c.messages = c.messages || [];
  c.messages.push(userMsg);
  let derivedTitle = '';
  if (!c.title || c.title === '新聊天') {
    derivedTitle = makeTitleFromText(text || (pdfs[0]?.name) || `[${imgs.length} 张图片]`);
    c.title = derivedTitle;
  }
  touchChat(c);
  pending = [];
  renderThumbs();

  // 用户消息渲染（图片用本地 thumbDataUrl，PDF 用刚拿到的 file_id 走 /api/files）
  renderUserMessageImmediate(userMsg, c.id);
  topTitleEl.textContent = c.title;
  renderChatList();

  inputEl.value = '';
  autoResize();

  sending = true;
  stoppedByUser = false;
  sendBtn.classList.add('stop');
  sendBtn.setAttribute('aria-label', '停止');
  const ctrl = new AbortController();
  currentAbortCtrl = ctrl;

  // 助手消息占位
  const wrap = renderMessage('assistant', '', null, c.id);
  wrap.classList.add('streaming');
  const contentEl = wrap.querySelector('.content');
  const copyBtn = wrap.querySelector('.copy-btn');
  const abody = wrap.querySelector('.abody');
  let acc = '';

  wrap.classList.add('thinking-phase');
  const think = document.createElement('div');
  think.className = 'thinking';
  think.innerHTML = '<span class="tk-dot"></span><span>思考中</span><span class="tk-sec"></span>';
  abody.insertBefore(think, contentEl);
  const tkStart = Date.now();
  const tkSec = think.querySelector('.tk-sec');
  const tkTimer = setInterval(() => {
    tkSec.textContent = '· ' + Math.floor((Date.now() - tkStart) / 1000) + 's';
  }, 300);
  let thinkingStopped = false;
  function stopThinking() {
    if (thinkingStopped) return;
    thinkingStopped = true;
    clearInterval(tkTimer);
    think.remove();
    wrap.classList.remove('thinking-phase');
  }

  chatEl.scrollTop = chatEl.scrollHeight;

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        session_id: c.id,
        model: c.model || curModel,
        effort: c.effort || curEffort,
        thinking: (c.thinking ?? curThink),
        images: imagesForApi.length ? imagesForApi : undefined,
        document_ids: documentIds.length ? documentIds : undefined,
        title: derivedTitle || undefined,
      }),
      signal: ctrl.signal,
    });
    if (resp.status === 401) {
      wrap.remove();
      loginEl.classList.remove('hidden');
      return;
    }
    if (!resp.ok) throw new Error('HTTP ' + resp.status);

    const reader = resp.body.getReader();
    currentReader = reader;
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        for (const line of part.split('\n')) {
          if (!line.startsWith('data:')) continue;
          const payload = line.slice(5).trim();
          if (!payload) continue;
          let evt;
          try { evt = JSON.parse(payload); } catch { continue; }
          if (evt.type === 'session') {
            // 服务端已落盘，本地 chat 不再是纯本地
            c.isLocal = false;
          } else if (evt.type === 'text') {
            stopThinking();
            acc += evt.text;
            wrap.dataset.raw = acc;
            contentEl.innerHTML = renderMarkdown(acc);
            enhanceContent(contentEl);
            const nearBottom = chatEl.scrollHeight - chatEl.scrollTop - chatEl.clientHeight < 120;
            if (nearBottom) chatEl.scrollTop = chatEl.scrollHeight;
          } else if (evt.type === 'error') {
            stopThinking();
            wrap.classList.add('error');
            acc = '出错了: ' + evt.error;
            wrap.dataset.raw = acc;
            contentEl.textContent = acc;
          }
        }
      }
    }

    if (stoppedByUser) {
      if (acc) {
        const stopped = acc + '\n\n_（已停止）_';
        wrap.dataset.raw = stopped;
        contentEl.innerHTML = renderMarkdown(stopped);
        enhanceContent(contentEl);
        c.messages.push({ role: 'assistant', content: acc, interrupted: true });
      } else {
        wrap.remove();
      }
    } else {
      c.messages.push({ role: 'assistant', content: acc });
    }
    touchChat(c);
    renderChatList();
  } catch (err) {
    stopThinking();
    if (err.name === 'AbortError' || stoppedByUser) {
      if (acc) {
        const stopped = acc + '\n\n_（已停止）_';
        wrap.dataset.raw = stopped;
        contentEl.innerHTML = renderMarkdown(stopped);
        enhanceContent(contentEl);
        c.messages.push({ role: 'assistant', content: acc, interrupted: true });
      } else {
        wrap.remove();
      }
    } else {
      wrap.classList.add('error');
      contentEl.textContent = '请求失败: ' + err.message;
      c.messages.push({ role: 'assistant', content: '出错了: ' + err.message });
    }
  } finally {
    stopThinking();
    wrap.classList.remove('streaming');
    copyBtn.style.display = contentEl.textContent.trim() ? '' : 'none';
    sending = false;
    stoppedByUser = false;
    sendBtn.classList.remove('stop');
    sendBtn.setAttribute('aria-label', '发送');
    currentAbortCtrl = null;
    currentReader = null;
    // 触屏设备别 focus，否则手机回复完就弹出键盘很烦
    const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
    if (!isTouch) inputEl.focus();
  }
});

// 立即渲染用户消息（图片用本地 base64 thumb 显示；下次切换会话会从服务端取真正的 file_id）
function renderUserMessageImmediate(msg, sid) {
  const empty = chatInnerEl.querySelector('.empty-state');
  if (empty) empty.remove();
  const wrap = document.createElement('div');
  wrap.className = 'msg user';
  const col = document.createElement('div');
  col.className = 'user-col';
  if (msg.attachments && msg.attachments.length) {
    const imgs = msg.attachments.filter(a => a.type === 'image');
    const pdfs = msg.attachments.filter(a => a.type === 'pdf');
    if (imgs.length) {
      const tw = document.createElement('div');
      tw.className = 'msg-thumbs';
      for (const a of imgs) {
        const im = document.createElement('img');
        im.src = a._localThumb || '';
        im.width = 110; im.height = 110;
        tw.appendChild(im);
      }
      col.appendChild(tw);
    }
    for (const a of pdfs) {
      const card = document.createElement('a');
      card.className = 'pdf-card';
      card.href = `/api/files/${encodeURIComponent(sid)}/${encodeURIComponent(a.file_id)}`;
      card.target = '_blank';
      card.rel = 'noopener';
      card.innerHTML = PDF_SVG + `<div class="pdf-info"><div class="pdf-name"></div><div class="pdf-size"></div></div>`;
      card.querySelector('.pdf-name').textContent = a.name || 'document.pdf';
      card.querySelector('.pdf-size').textContent = fmtSize(a.size);
      col.appendChild(card);
    }
  }
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = msg.content || '';
  col.appendChild(bubble);
  if (!msg.content) wrap.classList.add('no-text');
  wrap.appendChild(col);
  chatInnerEl.appendChild(wrap);
}

function paintModelPill() {
  modelPillLabelEl.textContent = modelMeta(curModel).short;
}
function paintModelList() {
  modelListEl.innerHTML = '';

  // 分组显示：Claude 模型和 API 模型
  const claudeModels = AVAILABLE_MODELS.filter(m => m.category === 'claude');
  const apiModels = AVAILABLE_MODELS.filter(m => m.category === 'api');

  if (claudeModels.length > 0) {
    const header = document.createElement('div');
    header.className = 'model-group-header';
    header.textContent = 'Claude 模型';
    modelListEl.appendChild(header);

    claudeModels.forEach(m => {
      const row = createModelItem(m);
      modelListEl.appendChild(row);
    });
  }

  if (apiModels.length > 0) {
    const header = document.createElement('div');
    header.className = 'model-group-header';
    header.textContent = 'API 模型';
    modelListEl.appendChild(header);

    apiModels.forEach(m => {
      const row = createModelItem(m);
      modelListEl.appendChild(row);
    });
  }

  if (AVAILABLE_MODELS.length === 0) {
    modelListEl.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-dim);">暂无可用模型<br>请在设置中添加 API</div>';
  }
}

function createModelItem(m) {
  const row = document.createElement('div');
  row.className = 'model-item' + (m.id === curModel ? ' active' : '');
  row.dataset.id = m.id;
  row.innerHTML = `
    <div class="mi-text">
      <div class="mi-name"></div>
      <div class="mi-sub"></div>
    </div>
    <svg class="mi-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>`;
  row.querySelector('.mi-name').textContent = m.name;
  row.querySelector('.mi-sub').textContent  = m.desc + (m.supports_pdf ? ' 📄' : '');
  row.addEventListener('click', () => {
    curModel = m.id;
    localStorage.setItem(MODEL_KEY, curModel);
    paintModelPill();
    paintModelList();
    paintThinkRow();
    paintEffortRow();
    paintAttachOptions();
    closeSheet('sheetModel');
    // 切换模型时清理与新模型不兼容的附件（Claude 不能带 PDF）
    if (!NON_CLAUDE_MODELS.has(curModel) && countPdfs() > 0) {
      for (const p of pending.filter(x => x.kind === 'pdf' && x.xhr)) {
        try { p.xhr.abort(); } catch {}
      }
      pending = pending.filter(p => p.kind !== 'pdf');
      renderThumbs();
    }
  });
  return row;
}
function paintThinkRow() {
  const dim = NON_CLAUDE_MODELS.has(curModel);
  rowThinkEl.classList.toggle('disabled', dim);
  thinkToggleEl.classList.toggle('on', curThink && !dim);
}
function paintEffortRow() {
  const dim = NON_CLAUDE_MODELS.has(curModel) || !curThink;
  rowEffortEl.classList.toggle('disabled', dim);
  for (const b of segEffortEl.querySelectorAll('button')) {
    b.classList.toggle('on', b.dataset.v === curEffort);
  }
}

modelPillEl.addEventListener('click', () => {
  paintModelList();
  paintThinkRow();
  paintEffortRow();
  openSheet('sheetModel');
});
thinkToggleEl.addEventListener('click', () => {
  if (NON_CLAUDE_MODELS.has(curModel)) return;
  curThink = !curThink;
  localStorage.setItem(THINK_KEY, curThink ? '1' : '0');
  paintThinkRow();
  paintEffortRow();
});
segEffortEl.addEventListener('click', (e) => {
  const btn = e.target.closest('button');
  if (!btn) return;
  curEffort = btn.dataset.v;
  localStorage.setItem(EFFORT_KEY, curEffort);
  paintEffortRow();
});

// ============== 加载模型列表 ==============
async function loadModels() {
  try {
    const resp = await fetch('/api/models');
    if (!resp.ok) throw new Error('加载模型失败');
    const data = await resp.json();
    AVAILABLE_MODELS = data.models || [];

    // 更新 NON_CLAUDE_MODELS 集合
    NON_CLAUDE_MODELS.clear();
    AVAILABLE_MODELS.forEach(m => {
      if (m.category === 'api') {
        NON_CLAUDE_MODELS.add(m.id);
      }
    });

    // 如果当前模型不在列表中，切换到第一个可用模型
    if (AVAILABLE_MODELS.length > 0 && !AVAILABLE_MODELS.find(m => m.id === curModel)) {
      curModel = AVAILABLE_MODELS[0].id;
      localStorage.setItem(MODEL_KEY, curModel);
    }

    paintModelPill();
  } catch (err) {
    console.error('加载模型失败:', err);
  }
}

async function deleteModel(providerName, model) {
  try {
    const resp = await fetch(`/api/config/providers/${encodeURIComponent(providerName)}/models/${encodeURIComponent(model)}`, {
      method: 'DELETE'
    });

    const data = await resp.json();

    if (data.ok) {
      await loadProviders();
      await loadModels();
    } else {
      alert(data.error || '删除失败');
    }
  } catch (err) {
    alert('网络错误: ' + err.message);
  }
}

// ==============手机键盘过渡 ==============
// 让 #app 高度跟随 visualViewport.height（键盘弹起时变小）。
// CSS 上挂了 transition: height 0.1s，就能看到一个柔和的上推过渡。
function setupKeyboardTransition() {
  const vv = window.visualViewport;
  if (!vv) return;
  const apply = () => {
    document.documentElement.style.setProperty('--app-h', vv.height + 'px');
    // 关键：Android 键盘弹出时 layout 会被浏览器整体上滚（让聚焦元素进入可视区），
    // vv.offsetTop 就是上滚的距离；#app 用 fixed 定位 + 这个 top 才能跟着 visual viewport。
    document.documentElement.style.setProperty('--app-top', (vv.offsetTop || 0) + 'px');
    // 当聊天接近底部时，键盘弹起后保持贴底（不然 layout 缩小后会露出空白）
    const nearBottom = chatEl.scrollHeight - chatEl.scrollTop - chatEl.clientHeight < 160;
    if (nearBottom) {
      // 等下一帧让高度过渡先开始
      requestAnimationFrame(() => { chatEl.scrollTop = chatEl.scrollHeight; });
    }
  };
  vv.addEventListener('resize', apply);
  vv.addEventListener('scroll', apply);
  apply();
}

function initLearningMode() {
  // 模式切换
  const chatModeBtn = document.getElementById('chatModeBtn');
  const learnModeBtn = document.getElementById('learnModeBtn');

  if (!chatModeBtn || !learnModeBtn) {
    console.warn('Learning mode buttons not found');
    return;
  }

  function setLearningMode(enabled) {
    learningMode = enabled;
    localStorage.setItem(LEARN_MODE_KEY, enabled ? 'true' : 'false');

    if (enabled) {
      chatModeBtn.classList.remove('active');
      learnModeBtn.classList.add('active');
      chatEl.classList.add('learning-mode');
    } else {
      chatModeBtn.classList.add('active');
      learnModeBtn.classList.remove('active');
      chatEl.classList.remove('learning-mode');
      hideWordCard();
    }
  }

  chatModeBtn.addEventListener('click', () => setLearningMode(false));
  learnModeBtn.addEventListener('click', () => setLearningMode(true));

  // 初始化模式
  if (learningMode) {
    setLearningMode(true);
  }

  // 双击单词查询
  chatEl.addEventListener('dblclick', async (e) => {
    if (!learningMode) return;

    const selection = window.getSelection();
    const text = selection.toString().trim();

    // 验证是否为单个英文单词
    if (!text || !/^[a-zA-Z]+$/.test(text)) {
      return;
    }

    // 显示翻译卡片
    await showWordCard(text, e.clientX, e.clientY);
  });

  // 点击外部关闭翻译卡片
  document.addEventListener('click', (e) => {
    const wordCard = document.getElementById('wordCard');
    if (wordCardVisible && wordCard && !wordCard.contains(e.target)) {
      hideWordCard();
    }
  });

  // 关闭按钮
  const wordCardClose = document.getElementById('wordCardClose');
  if (wordCardClose) {
    wordCardClose.addEventListener('click', () => {
      hideWordCard();
    });
  }

  // 添加到生词本
  const addToVocabBtn = document.getElementById('addToVocabBtn');
  if (addToVocabBtn) {
    addToVocabBtn.addEventListener('click', async () => {
      if (!currentWord) return;

      addToVocabBtn.disabled = true;
      addToVocabBtn.textContent = '添加中...';

      try {
        // 获取当前单词数据
        const resp = await fetch(`/api/dictionary/${encodeURIComponent(currentWord)}`);
        const data = await resp.json();

        if (!data.ok) {
          alert('获取单词信息失败');
          return;
        }

        const wordData = data.data;

        // 添加到生词本
        const addResp = await fetch('/api/vocabulary', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            word: currentWord,
            phonetic: wordData.phonetic || '',
            translation: wordData.translation || ''
          })
        });

        const addData = await addResp.json();

        if (addData.ok) {
          addToVocabBtn.textContent = '✓ 已添加';
        } else {
          addToVocabBtn.textContent = '➕ 加入生词本';
          addToVocabBtn.disabled = false;
          alert(addData.error || '添加失败');
        }

      } catch (err) {
        addToVocabBtn.textContent = '➕ 加入生词本';
        addToVocabBtn.disabled = false;
        alert('添加失败: ' + err.message);
      }
    });
  }

  // 生词本按钮（已移到设置菜单，不需要单独绑定）

  // 生词本点击外部关闭
  const sheetVocab = document.getElementById('sheetVocab');
  if (sheetVocab) {
    const vocabBackdrop = sheetVocab.querySelector('.sheet-backdrop');
    if (vocabBackdrop) {
      vocabBackdrop.addEventListener('click', () => {
        closeSheet('sheetVocab');
      });
    }
  }

  // 导出生词本
  const exportVocabBtn = document.getElementById('exportVocabBtn');
  if (exportVocabBtn) {
    exportVocabBtn.addEventListener('click', async () => {
      try {
        const resp = await fetch('/api/vocabulary');
        const data = await resp.json();

        if (!data.ok || data.words.length === 0) {
          alert('生词本为空，无法导出');
          return;
        }

        // 生成 CSV
        let csv = 'Word,Phonetic,Translation,Added At\n';
        data.words.forEach(word => {
          const date = new Date(word.added_at * 1000).toLocaleString();
          csv += `"${word.word}","${word.phonetic}","${word.translation}","${date}"\n`;
        });

        // 下载
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `vocabulary_${Date.now()}.csv`;
        link.click();

      } catch (err) {
        alert('导出失败: ' + err.message);
      }
    });
  }

  // 清空生词本
  const clearVocabBtn = document.getElementById('clearVocabBtn');
  if (clearVocabBtn) {
    clearVocabBtn.addEventListener('click', async () => {
      if (!confirm('确定要清空生词本吗？此操作不可恢复！')) {
        return;
      }

      try {
        const resp = await fetch('/api/vocabulary');
        const data = await resp.json();

        if (!data.ok) return;

        // 逐个删除
        for (const word of data.words) {
          await fetch(`/api/vocabulary/${encodeURIComponent(word.word)}`, {
            method: 'DELETE'
          });
        }

        await loadVocabulary();

      } catch (err) {
        alert('清空失败: ' + err.message);
      }
    });
  }
}
async function showWordCard(word, x, y) {
  const wordCard = document.getElementById('wordCard');
  const wordText = document.getElementById('wordText');
  const wordCardBody = document.getElementById('wordCardBody');
  const wordCardFooter = document.getElementById('wordCardFooter');

  currentWord = word.toLowerCase();
  wordText.textContent = currentWord;
  wordCardBody.innerHTML = '<div class="word-loading">查询中...</div>';
  wordCardFooter.style.display = 'none';

  // 定位卡片
  wordCard.style.left = x + 'px';
  wordCard.style.top = y + 'px';
  wordCard.classList.add('visible');
  wordCardVisible = true;

  // 调整位置避免超出屏幕
  setTimeout(() => {
    const rect = wordCard.getBoundingClientRect();
    if (rect.right > window.innerWidth) {
      wordCard.style.left = (window.innerWidth - rect.width - 10) + 'px';
    }
    if (rect.bottom > window.innerHeight) {
      wordCard.style.top = (window.innerHeight - rect.height - 10) + 'px';
    }
    if (rect.left < 0) {
      wordCard.style.left = '10px';
    }
    if (rect.top < 0) {
      wordCard.style.top = '10px';
    }
  }, 10);

  // 查询单词
  try {
    const resp = await fetch(`/api/dictionary/${encodeURIComponent(currentWord)}`);
    const data = await resp.json();

    if (!data.ok) {
      wordCardBody.innerHTML = '<div class="word-loading">未找到该单词</div>';
      return;
    }

    const wordData = data.data;

    // 显示释义
    let html = '';

    if (wordData.phonetic) {
      html += `<div class="word-phonetic">/${wordData.phonetic}/</div>`;
    }

    html += '<div class="word-meanings">';

    // 标签
    if (wordData.oxford) {
      html += '<span class="word-tag">牛津3000</span>';
    }
    if (wordData.collins > 0) {
      html += `<span class="word-tag">柯林斯${wordData.collins}星</span>`;
    }

    // 中文释义
    if (wordData.translation) {
      html += `<p><strong>释义：</strong>${wordData.translation}</p>`;
    }

    // 英文释义
    if (wordData.definition) {
      html += `<p><strong>Definition:</strong> ${wordData.definition}</p>`;
    }

    // 词性
    if (wordData.pos) {
      html += `<p><strong>词性：</strong>${wordData.pos}</p>`;
    }

    html += '</div>';

    wordCardBody.innerHTML = html;

    // 检查是否已在生词本中
    const checkResp = await fetch(`/api/vocabulary/check/${encodeURIComponent(currentWord)}`);
    const checkData = await checkResp.json();

    const addBtn = document.getElementById('addToVocabBtn');
    if (checkData.ok && checkData.exists) {
      addBtn.textContent = '✓ 已在生词本';
      addBtn.disabled = true;
    } else {
      addBtn.textContent = '➕ 加入生词本';
      addBtn.disabled = false;
    }

    wordCardFooter.style.display = 'flex';

  } catch (err) {
    wordCardBody.innerHTML = `<div class="word-loading">查询失败: ${err.message}</div>`;
  }
}

// 加载生词本
async function loadVocabulary() {
  try {
    const resp = await fetch('/api/vocabulary');
    const data = await resp.json();

    if (!data.ok) {
      alert('加载生词本失败');
      return;
    }

    // 更新统计
    document.getElementById('vocabTotalCount').textContent = data.stats.total_words;
    document.getElementById('vocabTodayCount').textContent = data.stats.today_added;
    document.getElementById('vocabReviewCount').textContent = data.stats.total_reviews;

    // 渲染列表
    const vocabList = document.getElementById('vocabList');

    if (data.words.length === 0) {
      vocabList.innerHTML = '<div class="vocab-empty">生词本为空</div>';
      return;
    }

    let html = '';
    data.words.forEach(word => {
      html += `
        <div class="vocab-item">
          <div class="vocab-item-content">
            <div class="vocab-item-word">${word.word}</div>
            ${word.phonetic ? `<div class="vocab-item-phonetic">/${word.phonetic}/</div>` : ''}
            ${word.translation ? `<div class="vocab-item-translation">${word.translation}</div>` : ''}
          </div>
          <button class="vocab-item-delete" data-word="${word.word}">×</button>
        </div>
      `;
    });

    vocabList.querySelectorAll('.vocab-item-delete').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const word = e.target.dataset.word;
        if (confirm(`确定要删除 "${word}" 吗？`)) {
          await deleteVocabWord(word);
        }
      });
    });

  } catch (err) {
    alert('加载生词本失败: ' + err.message);
  }
}

// 删除生词
async function deleteVocabWord(word) {
  try {
    const resp = await fetch(`/api/vocabulary/${encodeURIComponent(word)}`, {
      method: 'DELETE'
    });

    const data = await resp.json();

    if (data.ok) {
      await loadVocabulary();
    } else {
      alert(data.error || '删除失败');
    }

  } catch (err) {
    alert('删除失败: ' + err.message);
  }
}

                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              </svg>
            </button>
          </div>
          <div class="article-title">${article.title}</div>
          <div class="article-meta">
            <span class="article-difficulty ${difficultyClass}">${difficultyIcon} ${difficultyText}</span>
            <span>${article.category || '未分类'}</span>

// 生成文章表单提交
document.getElementById('generateArticleForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const model = document.getElementById('generateModel').value;
  const topic = document.getElementById('generateTopic').value.trim();
  const count = parseInt(document.getElementById('generateCount').value);

  if (!model || !topic) {
    alert('请填写完整信息');
    return;
  }

  const progressArea = document.getElementById('generateProgressArea');
  const progressText = document.getElementById('generateProgressText');
  const progressFill = document.getElementById('generateProgressFill');
  const startBtn = document.getElementById('startGenerateBtn');

  // 显示进度
  progressArea.style.display = 'block';
  progressText.textContent = '正在生成文章...';
  progressFill.style.width = '30%';
  startBtn.disabled = true;

  try {
    const resp = await fetch('/api/reading/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, topic, count })
    });

    if (!resp.ok) {
      const errorText = await resp.text();
      console.error('生成请求失败:', resp.status, errorText);
      throw new Error(`生成请求失败 (${resp.status}): ${errorText}`);
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let generatedText = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.trim() || !line.startsWith('data: ')) continue;

        try {
          const data = JSON.parse(line.slice(6));

          if (data.type === 'text') {
            generatedText += data.text;
            progressText.textContent = `正在生成... (${generatedText.length} 字符)`;
            progressFill.style.width = '60%';
          } else if (data.type === 'done') {
            progressText.textContent = `✅ 生成完成！已保存 ${data.articles.length} 篇文章`;
            progressFill.style.width = '100%';

            setTimeout(() => {
              closeSheet('sheetGenerateArticle');
              // 重新加载文章列表
              const activeFilter = document.querySelector('.filter-btn.active');
              const difficulty = activeFilter ? activeFilter.dataset.difficulty : 'all';
              loadArticles(difficulty === 'all' ? null : difficulty);

              // 重置表单
              document.getElementById('generateArticleForm').reset();
              progressArea.style.display = 'none';
              progressFill.style.width = '0%';
              startBtn.disabled = false;
            }, 1500);

          } else if (data.type === 'error') {
            throw new Error(data.error);
          }
        } catch (err) {
          console.error('解析事件失败:', err);
        }
      }
    }

  } catch (err) {
    progressText.textContent = '❌ 生成失败: ' + err.message;
    progressFill.style.width = '0%';
    startBtn.disabled = false;
  }
});

      method: 'POST',

// 渲染题目
function renderQuestion() {
  const question = currentQuestions[currentQuestionIndex];

  // 更新进度
  document.getElementById('questionProgress').textContent =
    `题目 ${currentQuestionIndex + 1}/${currentQuestions.length}`;

  // 更新题目文本
  document.getElementById('questionText').textContent = question.question_text;

  // 处理选项格式（支持数组和对象两种格式）
  let optionsArray = [];
  if (Array.isArray(question.options)) {
    // 数组格式: ["option1", "option2", ...]
    optionsArray = question.options;
  } else if (typeof question.options === 'object') {
    // 对象格式: {"A": "option1", "B": "option2", ...}
    optionsArray = Object.entries(question.options)
      .sort((a, b) => a[0].localeCompare(b[0]))
      .map(([key, value]) => value);
  }

  // 渲染选项
  const optionsHtml = optionsArray.map((option, index) => {
    const optionKey = String.fromCharCode(65 + index); // A, B, C, D
    const isSelected = currentAnswers[question.id] === optionKey;
    return `
      <button class="option-btn ${isSelected ? 'selected' : ''}" data-option="${optionKey}">
        ${optionKey}. ${option}
      </button>
    `;
  }).join('');

  document.getElementById('questionOptions').innerHTML = optionsHtml;

  // 绑定选项点击事件
  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const option = btn.dataset.option;
      currentAnswers[question.id] = option;

      // 更新选中状态
      document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });

  // 更新按钮状态
  document.getElementById('prevQuestionBtn').disabled = currentQuestionIndex === 0;

  const isLastQuestion = currentQuestionIndex === currentQuestions.length - 1;
  document.getElementById('nextQuestionBtn').style.display = isLastQuestion ? 'none' : 'inline-block';
  document.getElementById('submitAnswersBtn').style.display = isLastQuestion ? 'inline-block' : 'none';
}

// 上一题
document.getElementById('prevQuestionBtn').addEventListener('click', () => {
  if (currentQuestionIndex > 0) {
    currentQuestionIndex--;
    renderQuestion();
  }
});

// 下一题
document.getElementById('nextQuestionBtn').addEventListener('click', () => {
  if (currentQuestionIndex < currentQuestions.length - 1) {
    currentQuestionIndex++;
    renderQuestion();
  }
});

// 提交答案
document.getElementById('submitAnswersBtn').addEventListener('click', async () => {
  // 检查是否所有题目都已回答
  const unanswered = currentQuestions.filter(q => !currentAnswers[q.id]);

  if (unanswered.length > 0) {
    if (!confirm(`还有 ${unanswered.length} 道题未回答，确定要提交吗？`)) {
      return;
    }
  }

  try {
    // 转换答案格式
    const answers = {};
    currentQuestions.forEach(q => {
      answers[q.id] = currentAnswers[q.id] || '';
    });

    const resp = await fetch('/api/reading/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        record_id: currentRecordId,
        answers: answers
      })
    });

    const data = await resp.json();

    if (!data.ok) {
      alert('提交失败: ' + (data.error || '未知错误'));
      return;
    }

    // 显示结果
    showResult(data);

  } catch (err) {
    alert('提交失败: ' + err.message);
  }
});

// 显示结果
function showResult(result) {
  closeSheet('sheetReadingExercise');
  openSheet('sheetReadingResult');

  const container = document.getElementById('resultContainer');

  let html = `
    <div class="result-header">
      <div class="result-score">${Math.round(result.score)}分</div>
      <div class="result-subtitle">答对 ${result.correct}/${result.total} 题</div>
    </div>
    <div class="result-list">
  `;

  result.results.forEach((r, index) => {
    const statusClass = r.is_correct ? 'correct' : 'wrong';
    const statusIcon = r.is_correct ? '✓' : '✗';
    const statusText = r.is_correct ? '正确' : '错误';

    html += `
      <div class="result-item ${statusClass}">
        <div class="result-question">
          ${statusIcon} 题目 ${index + 1}: ${r.question_text}
        </div>
        <div class="result-answer">你的答案: ${r.user_answer || '未作答'}</div>
        ${!r.is_correct ? `<div class="result-answer">正确答案: ${r.correct_answer}</div>` : ''}
        ${r.explanation ? `<div class="result-explanation">解析: ${r.explanation}</div>` : ''}
      </div>
    `;
  });

  html += `
    </div>
    <div class="result-actions">
      <button class="nav-btn secondary" id="backToListBtn">返回列表</button>
      <button class="nav-btn" id="retryBtn">再做一次</button>
    </div>
  `;

  container.innerHTML = html;

  // 绑定按钮事件
  document.getElementById('backToListBtn').addEventListener('click', () => {
    closeSheet('sheetReadingResult');
    openSheet('sheetReading');
    loadArticles();
  });

  document.getElementById('retryBtn').addEventListener('click', () => {
    closeSheet('sheetReadingResult');
    startReading(currentArticle.id);
  });
}

// 返回按钮
document.getElementById('readingBackBtn').addEventListener('click', () => {
  if (confirm('确定要退出吗？当前进度将不会保存。')) {
    closeSheet('sheetReadingExercise');
    openSheet('sheetReading');
  }
});

// 启用阅读区域的双击查词功能
function enableReadingWordLookup() {
  const articleContent = document.getElementById('articleContent');

  if (!articleContent) return;

  // 移除旧的事件监听器（如果有）
  articleContent.replaceWith(articleContent.cloneNode(true));
  const newArticleContent = document.getElementById('articleContent');

  // 添加双击事件监听
  newArticleContent.addEventListener('dblclick', async (e) => {
    const selection = window.getSelection();
    const text = selection.toString().trim();

    // 验证是否为单个英文单词
    if (!text || !/^[a-zA-Z]+$/.test(text)) {
      return;
    }

    // 显示翻译卡片
    await showWordCard(text, e.clientX, e.clientY);
  });

  // 添加样式提示用户可以双击查词
  newArticleContent.style.cursor = 'text';
  newArticleContent.style.userSelect = 'text';
}

// ============== Init ==============
(async function init() {
  paintModelPill();
  paintAttachOptions();
  autoResize();
  setupKeyboardTransition();
  // 先空渲染一次，避免登录前页面太空
  renderChatList();
  renderActive();
  const authed = await checkAuth();
  if (authed) {
    await loadUserData();
  }
  // 初始化英语学习功能
  initLearningMode();
  // 未登录时 loadUserData() 由 loginForm submit 回调触发
})();
</script>
